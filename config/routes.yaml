gateway:
  host: "0.0.0.0"
  port: 8000

rate_limiting:
  enabled: true
  requests_per_minute: 60
  burst_size: 10

auth:
  enabled: true
  jwt_secret: "your-secret-key-change-in-production"
  jwt_algorithm: "HS256"
  public_paths:
    - "/health"
    - "/metrics"
    - "/admin"
    - "/api/v1/auth/login"

circuit_breaker:
  failure_threshold: 5       # open circuit after 5 failures
  recovery_timeout: 30       # try again after 30 seconds
  half_open_max_calls: 3     # allow 3 test requests in half-open

routes:
  - path: "/api/v1/users"
    prefix_match: true
    service: "user_service"
    targets:
      - url: "http://localhost:8001"
        weight: 3
      - url: "http://localhost:8002"
        weight: 1
    methods: ["GET", "POST", "PUT", "DELETE"]
    rate_limit_override: 100  # custom limit for this route
    strip_prefix: "/api/v1"
    add_headers:
      X-Service-Name: "user-service"

  - path: "/api/v1/orders"
    prefix_match: true
    service: "order_service"
    targets:
      - url: "http://localhost:8003"
        weight: 1
    methods: ["GET", "POST"]
    strip_prefix: "/api/v1"
    add_headers:
      X-Service-Name: "order-service"

  - path: "/api/v1/payments"
    prefix_match: true
    service: "payment_service"
    targets:
      - url: "http://localhost:8004"
        weight: 1
    methods: ["GET", "POST"]
    strip_prefix: "/api/v1"
    timeout: 10
    add_headers:
      X-Service-Name: "payment-service"